<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Guides - {{ site.site_name }}</title>
    <meta name="description" content="Browse all OKSushi guides for sushi travel planning in Japan.">
    <meta name="robots" content="index,follow,max-image-preview:large">
    <link rel="canonical" href="{{ site.site_url }}/guide{% if lang == 'ko' %}?lang=ko{% endif %}">
    <link rel="shortcut icon" href="/static/images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% include 'header.html' %}

    <div class="content-wrapper" style="margin-top: 40px;">
        <h2 class="list-title" style="text-align: center;">📖 All {{ site.site_name }} Guides</h2>

        <div class="onsen-grid guide-grid">
            {% for guide in guides.get(lang, []) %}
            <a href="/guide/{{ guide.id }}?lang={{ lang }}" class="onsen-card">
                <img src="{{ guide.thumbnail }}" alt="{{ guide.title }}" class="card-thumb">
                <div class="card-content">
                    <h3 class="card-title">{{ guide.title }}</h3>
                    <p class="card-summary">{{ guide.summary }}</p>
                </div>
            </a>
            {% endfor %}
        </div>

        <div style="text-align: center; margin-top: 50px;">
            <a href="/?lang={{ lang }}" class="back-btn">🗺️ Back to Map</a>
        </div>
    </div>

    {% include 'footer.html' %}
</body>
</html>
